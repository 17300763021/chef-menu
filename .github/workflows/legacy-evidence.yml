name: Legacy Forensic Evidence

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/legacy-evidence.yml
      - scripts/capture_legacy_evidence.py
      - scripts/test_capture_legacy_evidence.py
      - supabase/migrations/*_add_legacy_evidence_manifests.sql

permissions:
  actions: read
  contents: read

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version-file: .python-version
      - name: Test evidence capture
        run: python scripts/test_capture_legacy_evidence.py
      - name: Capture and verify online evidence
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python scripts/capture_legacy_evidence.py --manifest-out evidence/manifest.json
      - name: Upload non-sensitive verification manifest
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: legacy-evidence-manifest-${{ github.sha }}
          path: evidence/manifest.json
          if-no-files-found: error
          retention-days: 90
