name: M2 Point-In-Time Universe Acceptance

on:
  workflow_dispatch:
    inputs:
      end_date:
        description: "Inclusive acceptance end date; blank uses runner yesterday"
        required: false
        type: string
  push:
    branches: [main]
    paths:
      - .github/workflows/market-data-pit-universe-acceptance.yml
      - scripts/market_data/**
      - scripts/test_market_calendar.py
      - scripts/test_point_in_time_universe.py
      - .python-version

permissions:
  contents: read

concurrency:
  group: m2-market-data-pit-universe-acceptance
  cancel-in-progress: false

jobs:
  pit-universe-acceptance:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version-file: .python-version
          cache: pip
          cache-dependency-path: scripts/market_data/requirements.lock.txt
      - name: Install pinned M2.2 dependencies
        run: python -m pip install -r scripts/market_data/requirements.lock.txt
      - name: Run deterministic M2.2 tests
        run: |
          python -m scripts.test_market_calendar
          python -m scripts.test_point_in_time_universe
      - name: Select acceptance end date
        id: sample
        env:
          INPUT_END_DATE: ${{ github.event.inputs.end_date }}
        run: echo "end_date=${INPUT_END_DATE:-$(date -u -d 'yesterday' +%F)}" >> "$GITHUB_OUTPUT"
      - name: Build live point-in-time CSI 800 evidence
        run: >-
          python -m scripts.market_data.pit_universe
          --end-date "${{ steps.sample.outputs.end_date }}"
          --output-dir pit-universe-acceptance
      - name: Upload non-authoritative M2.2 evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: m2-pit-universe-${{ github.sha }}-${{ steps.sample.outputs.end_date }}
          path: pit-universe-acceptance/*
          if-no-files-found: warn
          retention-days: 30
