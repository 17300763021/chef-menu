name: Stock Pending Requests

concurrency:
  group: stock-pending
  cancel-in-progress: false

on:
  schedule:
    - cron: "*/5 * * * 1-5"
  workflow_dispatch:

jobs:
  stock-pending:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: python -m pip install -r scripts/stock_engine/requirements.txt
      - name: Process pending stock requests
        env:
          TZ: Asia/Shanghai
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          LEGACY_ACCOUNT_FROZEN: "true"
        run: python scripts/run_stock_tasks.py --mode pending
