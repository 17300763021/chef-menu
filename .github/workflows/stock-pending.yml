name: Stock Pending Requests

concurrency:
  group: stock-pending
  cancel-in-progress: false

on:
  workflow_dispatch:

jobs:
  stock-pending:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version-file: .python-version
          cache: pip
          cache-dependency-path: scripts/stock_engine/requirements.lock.txt
      - name: Install dependencies
        run: python -m pip install -r scripts/stock_engine/requirements.lock.txt
      - name: Process pending stock requests
        env:
          TZ: Asia/Shanghai
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          LEGACY_ACCOUNT_FROZEN: "true"
        run: python scripts/run_stock_tasks.py --mode pending
