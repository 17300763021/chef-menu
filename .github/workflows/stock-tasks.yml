name: Stock Tasks

concurrency:
  group: stock-tasks
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Task mode"
        required: true
        default: "full"
        type: choice
        options:
          - full
          - night_scan
          - live_decision
          - live_session
          - backtest
          - sync_latest
          - pending

jobs:
  stock-tasks:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version-file: .python-version
          cache: pip
          cache-dependency-path: scripts/stock_engine/requirements.lock.txt
      - name: Install dependencies
        run: python -m pip install -r scripts/stock_engine/requirements.lock.txt
      - name: Run stock task
        env:
          TZ: Asia/Shanghai
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          LEGACY_ACCOUNT_FROZEN: "true"
          EVENT_NAME: ${{ github.event_name }}
          EVENT_SCHEDULE: ${{ github.event.schedule }}
          INPUT_MODE: ${{ github.event.inputs.mode }}
        run: |
          MODE="${INPUT_MODE:-live_session}"
          if [ "$EVENT_NAME" = "schedule" ] && [ "$EVENT_SCHEDULE" = "40 7 * * 1-5" ]; then
            MODE="full"
          fi
          if [ "$EVENT_NAME" = "schedule" ] && [ "$EVENT_SCHEDULE" != "40 7 * * 1-5" ]; then
            MODE="live_session"
          fi
          python scripts/run_stock_tasks.py --mode "$MODE"
