name: Cloud Runtime Foundation

on:
  schedule:
    - cron: "17,47 * * * 1-5"
  workflow_dispatch:
    inputs:
      mode:
        description: "M1 runtime mode"
        required: true
        default: "acceptance"
        type: choice
        options:
          - acceptance
          - scheduled
          - heartbeat
          - recover
  push:
    branches: [main]
    paths:
      - .github/workflows/cloud-runtime.yml
      - AGENTS.md
      - scripts/cloud_runtime.py
      - scripts/test_cloud_runtime.py
      - scripts/framework-requirements.txt
      - .python-version
      - supabase/migrations/*_add_cloud_runtime_foundation.sql

permissions:
  contents: read

concurrency:
  group: cloud-runtime-foundation
  cancel-in-progress: false

jobs:
  runtime:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version-file: .python-version
      - name: Test cloud runtime controls
        run: python scripts/test_cloud_runtime.py
      - name: Select cloud runtime mode
        id: mode
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_MODE: ${{ github.event.inputs.mode }}
        run: |
          if [ "$EVENT_NAME" = "schedule" ]; then
            echo "value=scheduled" >> "$GITHUB_OUTPUT"
          elif [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "value=${INPUT_MODE:-acceptance}" >> "$GITHUB_OUTPUT"
          else
            echo "value=acceptance" >> "$GITHUB_OUTPUT"
          fi
      - name: Run cloud runtime
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: >-
          python scripts/cloud_runtime.py
          --mode "${{ steps.mode.outputs.value }}"
          --report-out "cloud-runtime/report-${{ steps.mode.outputs.value }}.json"
      - name: Repeat acceptance to prove idempotency
        if: steps.mode.outputs.value == 'acceptance'
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: >-
          python scripts/cloud_runtime.py
          --mode acceptance
          --report-out cloud-runtime/report-acceptance-repeat.json
      - name: Upload non-sensitive M1 report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: cloud-runtime-${{ github.sha }}-${{ steps.mode.outputs.value }}
          path: cloud-runtime/*.json
          if-no-files-found: error
          retention-days: 30

  framework-smoke:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version-file: .python-version
          cache: pip
          cache-dependency-path: scripts/framework-requirements.txt
      - name: Install pinned mature frameworks
        run: python -m pip install -r scripts/framework-requirements.txt
      - name: Verify framework imports and versions
        run: |
          python -c "import qlib, rqalpha; from importlib.metadata import version; print('pyqlib', version('pyqlib')); print('rqalpha', version('rqalpha'))"
